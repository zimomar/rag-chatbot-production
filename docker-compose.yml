# =============================================================================
# RAG Local - Docker Compose
# =============================================================================
# 3 services: app (API + UI), chromadb, ollama
# Optimisé pour VPS Hetzner CX42 (8 vCPU, 16 Go RAM)

services:
  # ---------------------------------------------------------------------------
  # API (FastAPI)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src:ro
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # UI (Streamlit)
  # ---------------------------------------------------------------------------
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-ui
    command: ["streamlit", "run", "src/ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
      - APP_PASSWORD=${APP_PASSWORD:-}
    depends_on:
      - api
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  # ---------------------------------------------------------------------------
  # ChromaDB - Vector Store
  # ---------------------------------------------------------------------------
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: rag-chromadb
    ports:
      - "8001:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - rag-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8000))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Ollama - LLM Local
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      # Optimisations mémoire pour VPS 16 Go
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_KEEP_ALIVE=-1 # Ne jamais décharger les modèles de la RAM
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - rag-network
    restart: unless-stopped
    # Ollama + Mistral 7B Q4 utilise ~6-8 Go RAM
    deploy:
      resources:
        limits:
          memory: 10G
        reservations:
          memory: 4G
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  rag-network:
    driver: bridge
    name: rag-network

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  chroma_data:
    name: rag-chroma-data
  ollama_data:
    name: rag-ollama-data
